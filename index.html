<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSecrets — Anonymous Campus Community</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#080b11] via-[#0f172a] to-[#080b11] min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        // Core configuration variables linked directly to your database cluster env
        const SUPABASE_URL = "https://qlevjhkxjxwmeoavxgui.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZXZqaGt4anh3bWVvYXZ4Z3VpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODczMTMsImV4cCI6MjA5Njk2MzMxM30.kgXefZVgKsb-PWT627iRIR7-y7CjtEtK8lV4nTNC5tQ";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function App() {
            const [screen, setScreen] = React.useState('welcome'); // welcome, auth, feed
            const [isLogin, setIsLogin] = React.useState(false);
            const [university, setUniversity] = React.useState('atbu');
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [secrets, setSecrets] = React.useState([]);
            const [newSecret, setNewSecret] = React.useState('');
            const [showModal, setShowModal] = React.useState(false);
            const [showAdmin, setShowAdmin] = React.useState(false);
            const [loading, setLoading] = React.useState(false);
            
            const clickRef = React.useRef({ count: 0, last: 0 });

            React.useEffect(() => {
                if (screen === 'feed') {
                    fetchSecrets();
                    // Initialize system interface tracking icons
                    setTimeout(() => lucide.createIcons(), 100);
                }
            }, [screen]);

            async function fetchSecrets() {
                try {
                    let { data, error } = await supabaseClient
                        .from('secrets')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) throw error;
                    setSecrets(data || []);
                } catch (err) {
                    alert("Sync Error: " + err.message);
                }
            }

            async function handleAuth(e) {
                e.preventDefault();
                setLoading(true);
                try {
                    if (isLogin) {
                        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) throw error;
                    } else {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        alert("Account initialization sequence started! Check your email address inbox for your validation link.");
                    }
                    setScreen('feed');
                } catch (err) {
                    alert("Authentication Failure: " + err.message);
                } finally {
                    setLoading(false);
                }
            }

            async function postSecret() {
                if (!newSecret.trim()) return;
                setLoading(true);
                try {
                    const { error } = await supabaseClient.from('secrets').insert([{ content: newSecret.trim() }]);
                    if (error) throw error;
                    setNewSecret('');
                    setShowModal(false);
                    fetchSecrets();
                } catch (err) {
                    alert("Unable to publish message entry: " + err.message);
                } finally {
                    setLoading(false);
                }
            }

            async function clearDatabase() {
                if (!confirm("Are you sure you want to completely clear the live database feed?")) return;
                try {
                    const { error } = await supabaseClient.from('secrets').delete().neq('id', 0);
                    if (error) throw error;
                    alert("Database cleared successfully!");
                    setShowAdmin(false);
                    fetchSecrets();
                } catch (err) {
                    alert("Admin clearance sequence dropped: " + err.message);
                }
            }

            const handleLogoClick = () => {
                const now = Date.now();
                if (now - clickRef.current.last > 1500) clickRef.current.count = 0;
                clickRef.current.count++;
                clickRef.current.last = now;
                if (clickRef.current.count >= 5) {
                    clickRef.current.count = 0;
                    setShowAdmin(true);
                }
            };

            return (
                <div class="w-full">
                    {/* Landing University Screen Interface */}
                    {screen === 'welcome' && (
                        <div class="glass rounded-3xl p-6 text-center shadow-2xl space-y-8">
                            <div class="flex justify-center">
                                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                                    <span class="text-3xl font-bold text-white">U</span>
                                </div>
                            </div>
                            <div class="space-y-2">
                                <h1 class="text-3xl font-bold tracking-tight">Share Confessions <span class="text-blue-500 block mt-1">Anonymously</span></h1>
                                <p class="text-gray-400 text-sm px-4">Connect with your campus mates completely under the radar. No real identity, no drama.</p>
                            </div>
                            <div class="space-y-4 text-left">
                                <label class="text-xs font-semibold uppercase tracking-wider text-gray-400 block pl-1">Select Your University</label>
                                <select value={university} onChange={(e) => setUniversity(e.target.value)} class="w-full bg-[#1e293b] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
                                    <option value="atbu">Abubakar Tafawa Balewa University, Bauchi (ATBU)</option>
                                </select>
                                <button onClick={() => setScreen('auth')} class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl py-3.5 shadow-lg shadow-blue-500/10 transition-all active:scale-[0.98]">
                                    Continue
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Authentication Screen Interface Layout */}
                    {screen === 'auth' && (
                        <div class="glass rounded-3xl p-6 shadow-2xl space-y-6">
                            <div class="flex justify-between items-center">
                                <h2 class="text-2xl font-bold">{isLogin ? "Log In" : "Create Account"}</h2>
                                <button onClick={() => setIsLogin(!isLogin)} class="text-xs text-blue-400 font-medium hover:underline">
                                    {isLogin ? "Need an account? Sign Up" : "Have an account? Log In"}
                                </button>
                            </div>
                            <form onSubmit={handleAuth} class="space-y-4">
                                <div>
                                    <label class="text-xs font-medium text-gray-400 block mb-1">Campus Email Address</label>
                                    <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required placeholder="username@atbu.edu.ng" class="w-full bg-[#1e293b] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 text-sm" />
                                </div>
                                <div>
                                    <label class="text-xs font-medium text-gray-400 block mb-1">Password</label>
                                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} required placeholder="••••••••" class="w-full bg-[#1e293b] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 text-sm" />
                                </div>
                                <button type="submit" disabled={loading} class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl py-3 text-sm shadow-md transition-all">
                                    {loading ? "Processing..." : (isLogin ? "Log In" : "Sign Up")}
                                </button>
                            </form>
                        </div>
                    )}

                    {/* Main Platform Campus Feed Dashboard */}
                    {screen === 'feed' && (
                        <div class="glass rounded-3xl h-[85vh] flex flex-col shadow-2xl overflow-hidden">
                            <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0f172a]/80">
                                <div class="flex items-center gap-3">
                                    <div onClick={handleLogoClick} class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center cursor-pointer select-none">
                                        <span class="text-lg font-bold text-white">U</span>
                                    </div>
                                    <div>
                                        <h2 class="font-bold text-sm leading-tight">UniSecrets</h2>
                                        <p class="text-[10px] text-green-400 flex items-center gap-1">
                                            <span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block animate-pulse"></span> ATBU Campus Hub
                                        </p>
                                    </div>
                                </div>
                                <button onClick={() => setShowModal(true)} class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-colors">
                                    Post Secret
                                </button>
                            </header>

                            <div class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
                                {secrets.length === 0 ? (
                                    <p class="text-center text-xs text-gray-500 mt-8">No campus confessions found. Start the thread!</p>
                                ) : (
                                    secrets.map((item) => (
                                        <div key={item.id} class="glass rounded-2xl p-4 space-y-2 relative shadow-md">
                                            <p class="text-sm text-gray-200 pr-4 leading-relaxed">{item.content}</p>
                                            <div class="flex justify-between items-center text-[10px] text-gray-500 pt-1">
                                                <span>🤫 Anonymous Student</span>
                                                <span>{new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    )}

                    {/* Master System Overrides Panel Window */}
                    {showAdmin && (
                        <div class="fixed inset-0 bg-black/70 backdrop-blur-md flex justify-center items-center p-4 z-50">
                            <div class="w-full max-w-sm glass rounded-2xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-red-400 flex items-center gap-2">Master Panel</h3>
                                    <button onClick={() => setShowAdmin(false)} class="text-gray-400 hover:text-white">✕</button>
                                </div>
                                <p class="text-xs text-gray-400">Central administrative infrastructure metrics override control hub.</p>
                                <div class="border-t border-gray-800 pt-3">
                                    <button onClick={clearDatabase} class="w-full text-left bg-red-950/40 text-red-400 border border-red-900/50 rounded-xl p-3 text-xs font-medium hover:bg-red-900/20 transition-colors">
                                        ⚠️ Wipe Live Production Database Feed
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Posting View Window Modal Layout */}
                    {showModal && (
                        <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center p-4 z-50">
                            <div class="w-full max-w-sm glass rounded-2xl p-5 space-y-4">
                                <h3 class="font-bold text-sm">Post Anonymously</h3>
                                <textarea value={newSecret} onChange={(e) => setNewSecret(e.target.value)} rows="4" placeholder="What's happening on campus? Share anonymously..." class="w-full bg-[#1e293b] text-sm text-white border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-blue-500 hide-scrollbar resize-none"></textarea>
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => { setShowModal(false); setNewSecret(''); }} class="px-4 py-2 rounded-lg text-xs font-medium bg-gray-800 text-gray-300 hover:bg-gray-700">Cancel</button>
                                    <button onClick={postSecret} disabled={loading} class="px-4 py-2 rounded-lg text-xs font-medium bg-blue-600 text-white hover:bg-blue-700 shadow-md">
                                        {loading ? "Publishing..." : "Publish"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
