<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniSecrets - Anonymous Campus Community</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen p-4 bg-gradient-to-br from-[#080b11] via-[#0f172a] to-[#080b11]">

    <!-- Welcome / University Selection Screen -->
    <div id="welcome-screen" class="w-full max-w-md glass rounded-3xl p-6 text-center shadow-2xl space-y-8">
        <div class="flex justify-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <span class="text-3xl font-bold text-white">U</span>
            </div>
        </div>
        <div class="space-y-2">
            <h1 class="text-3xl font-bold tracking-tight">Share Confessions <span class="text-blue-500 block mt-1">Anonymously</span></h1>
            <p class="text-gray-400 text-sm px-4">Connect with your campus mates completely under the radar. No real identity, no drama.</p>
        </div>
        <div class="space-y-4 text-left">
            <label class="text-xs font-semibold uppercase tracking-wider text-gray-400 block pl-1">Select Your University</label>
            <select id="university-select" class="w-full bg-[#1e293b] border border-gray-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
                <option value="atbu">Abubakar Tafawa Balewa University, Bauchi (ATBU)</option>
            </select>
            <button id="continue-btn" onclick="handleContinue()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl py-3.5 shadow-lg shadow-blue-500/10 transition-all active:scale-[0.98]">
                Continue
            </button>
        </div>
    </div>

    <!-- Main Platform Feed -->
    <div id="main-platform" class="hidden w-full max-w-md glass rounded-3xl h-[85vh] flex flex-col shadow-2xl overflow-hidden">
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0f172a]/80">
            <div class="flex items-center gap-3">
                <div id="logo-clicker" onclick="handleLogoClick()" class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center cursor-pointer select-none">
                    <span class="text-lg font-bold text-white">U</span>
                </div>
                <div>
                    <h2 class="font-bold text-sm leading-tight">UniSecrets</h2>
                    <p class="text-[10px] text-green-400 flex items-center gap-1"><span class="w-1.5 h-1.5 bg-green-400 rounded-full inline-block animate-pulse"></span> ATBU Campus Hub</p>
                </div>
            </div>
            <button onclick="showPostModal()" class="bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1.5 transition-colors">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Post Secret
            </button>
        </header>

        <div id="secrets-feed" class="flex-1 overflow-y-auto p-4 space-y-4 hide-scrollbar">
            <p class="text-center text-xs text-gray-500 mt-8">Loading campus feed...</p>
        </div>
    </div>

    <!-- Hidden Master Admin Modal Screen -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md flex justify-center items-center p-4 z-50">
        <div class="w-full max-w-sm glass rounded-2xl p-6 space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="text-lg font-bold text-red-400 flex items-center gap-2"><i data-lucide="shield-alert" class="w-5 h-5"></i> Master Panel</h3>
                <button onclick="closeAdminModal()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <p class="text-xs text-gray-400">Total database control panel.</p>
            <div class="border-t border-gray-800 pt-3 space-y-2">
                <button onclick="clearAllSecrets()" class="w-full text-left bg-red-950/40 text-red-400 border border-red-900/50 rounded-xl p-3 text-xs font-medium hover:bg-red-900/20 transition-colors">
                    ⚠️ Clear All Database Secrets
                </button>
            </div>
        </div>
    </div>

    <!-- Post Secret Modal -->
    <div id="post-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex justify-center items-center p-4 z-50">
        <div class="w-full max-w-sm glass rounded-2xl p-5 space-y-4">
            <h3 class="font-bold text-sm">Post Anonymously</h3>
            <textarea id="secret-text" rows="4" placeholder="What's happening on campus?..." class="w-full bg-[#1e293b] text-sm text-white border border-gray-700 rounded-xl p-3 focus:outline-none focus:border-blue-500 hide-scrollbar resize-none"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="closePostModal()" class="px-4 py-2 rounded-lg text-xs font-medium bg-gray-800 text-gray-300 hover:bg-gray-700">Cancel</button>
                <button onclick="submitSecret()" id="submit-secret-btn" class="px-4 py-2 rounded-lg text-xs font-medium bg-blue-600 text-white hover:bg-blue-700 shadow-md">Publish</button>
            </div>
        </div>
    </div>

    <script>
        // Injected with your custom project parameters securely
        const SUPABASE_URL = "https://gscbshvbgfscwbyqugsk.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzY2JzaHZiZ2ZzY3dieXF1Z3NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk4NTYwMDAsImV4cCI6MjAyNTQxMjAwMH0.1vX_example_placeholder_key_structure_h8Y9s";

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let clickCount = 0;
        let lastClickTime = 0;

        function handleContinue() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('main-platform').classList.remove('hidden');
            lucide.createIcons();
            fetchSecrets();
        }

        async function fetchSecrets() {
            const container = document.getElementById('secrets-feed');
            try {
                let { data: secrets, error } = await _supabase
                    .from('secrets')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                container.innerHTML = '';
                if (!secrets || secrets.length === 0) {
                    container.innerHTML = '<p class="text-center text-xs text-gray-500 mt-8">No secrets posted yet. Be the first!</p>';
                    return;
                }

                secrets.forEach(item => {
                    const dateText = new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const card = document.createElement('div');
                    card.className = "glass rounded-2xl p-4 space-y-2 relative shadow-md";
                    card.innerHTML = `
                        <p class="text-sm text-gray-200 pr-4 leading-relaxed">${escapeHtml(item.content)}</p>
                        <div class="flex justify-between items-center text-[10px] text-gray-500 pt-1">
                            <span>🤫 Incognito User</span>
                            <span>${dateText}</span>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="text-center text-xs text-red-400 mt-8">Database connection error: ${err.message}</p>`;
            }
        }

        async function submitSecret() {
            const txt = document.getElementById('secret-text').value.trim();
            if(!txt) return;

            const btn = document.getElementById('submit-secret-btn');
            btn.disabled = true;
            btn.innerText = "Publishing...";

            try {
                const { error } = await _supabase
                    .from('secrets')
                    .insert([{ content: txt }]);

                if (error) throw error;
                closePostModal();
                fetchSecrets();
            } catch (err) {
                alert("Could not post: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish";
            }
        }

        async function clearAllSecrets() {
            if(!confirm("Are you sure you want to wipe the campus database feed?")) return;
            try {
                const { error } = await _supabase.from('secrets').delete().neq('id', 0);
                if (error) throw error;
                alert("Database successfully wiped clean!");
                closeAdminModal();
                fetchSecrets();
            } catch(err) {
                alert("Error: " + err.message);
            }
        }

        function showPostModal() { document.getElementById('post-modal').classList.remove('hidden'); }
        function closePostModal() { document.getElementById('post-modal').classList.add('hidden'); document.getElementById('secret-text').value = ''; }
        function handleLogoClick() {
            const now = Date.now();
            if (now - lastClickTime > 1500) clickCount = 0;
            clickCount++;
            lastClickTime = now;
            if (clickCount >= 5) {
                clickCount = 0;
                document.getElementById('admin-modal').classList.remove('hidden');
                lucide.createIcons();
            }
        }
        function closeAdminModal() { document.getElementById('admin-modal').classList.add('hidden'); }
        function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
    </script>
</body>
</html>
